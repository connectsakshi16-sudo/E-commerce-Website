<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNLEASH. | Sign Up</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <script src="signup.js"></script>
    <link rel="stylesheet" type="text/css" href="signup.css" />
   
  </head>
  
   
  <body>
    <div class="navbar">
      <div class="logo">UNLEASH.</div>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="blogPage.html">Blog</a>
        <a href="reviews.html">Reviews</a>
        <a href="contact.html">Contact</a>
      </div>

      
        
      </div>
    </div>

    <div class="signup-container">
      <div class="signup-header">
        <h1>Create Account</h1>
        <p>Join UNLEASH. to access exclusive offers and track your orders</p>
      </div>

      <form id="signupForm">
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="Enter your full name"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Create a password"
              required
            />
            <i
              class="fas fa-eye password-toggle"
              onclick="togglePassword()"
            ></i>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="Confirm your password"
            required
          />
        </div>

        <button type="submit" class="submit-btn">Sign Up</button>
      </form>

      <div class="divider">
        <span class="divider-text">or</span>
      </div>

      <div class="login-link">
        Already have an account? <a href="index.html">Log in</a>
      </div>
    </div>

    
  </body>
</html>
