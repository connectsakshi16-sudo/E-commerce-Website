<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNLEASH. | Search Results</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
<script src="cart.js"></script>
    <style>
      :root {
        --primary: #8a4fff;
        --primary-light: #b18aff;
        --primary-pastel: #f0e6ff;
        --secondary: #ff9eb7;
        --dark: #1a1a1a;
        --light: #ffffff;
        --gray: #888888;
        --light-bg: #faf8ff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Poppins", sans-serif;
        background-color: var(--light-bg);
        color: var(--dark);
        line-height: 1.7;
      }

      /* Top Bar */
      .top-bar {
        background: linear-gradient(to right, #ffd6e7, #c2f0ff, #e2d1ff);
        text-align: center;
        padding: 12px;
        font-size: 14px;
        font-weight: 500;
      }

      /* Navbar */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 5%;
        background: var(--light);
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 2px 30px rgba(0, 0, 0, 0.05);
      }

      .logo {
        font-family: "Playfair Display", serif;
        font-size: 32px;
        font-weight: 700;
        position: relative;
      }

      .logo::after {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(to right, var(--primary), var(--secondary));
      }

      .nav-links {
        display: flex;
        gap: 35px;
      }

      .nav-links a {
        position: relative;
        text-decoration: none;
        color: var(--dark);
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .nav-links a:hover {
        color: var(--primary);
      }

      .nav-links a::after {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 0;
        height: 2px;
        background-color: var(--primary);
        transition: width 0.3s ease;
      }

      .nav-links a:hover::after {
        width: 100%;
      }

      /* Search Bar */
      .search-container {
        position: relative;
        margin-right: 20px;
        flex-grow: 1;
        max-width: 500px;
      }

      .search-container input {
        padding: 10px 15px;
        border: 1px solid #e0e0e0;
        border-radius: 25px;
        width: 100%;
        font-family: "Poppins", sans-serif;
        transition: all 0.3s ease;
      }

      .search-container input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px var(--primary-pastel);
      }

      .search-container button {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--gray);
      }

      /* Login and Cart */
      .nav-icons {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .login-btn {
        font-weight: 500;
        cursor: pointer;
        transition: color 0.3s ease;
        background: none;
        border: none;
        font-family: "Poppins", sans-serif;
      }

      .login-btn:hover {
        color: var(--primary);
      }

      .cart-icon {
        position: relative;
      }

      .cart-count {
        position: absolute;
        top: -10px;
        right: -10px;
        background-color: var(--primary);
        color: var(--light);
        width: 22px;
        height: 22px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
      }

      /* Search Results */
      .search-results {
        padding: 60px 5%;
        max-width: 1200px;
        margin: 0 auto;
      }

      .search-header {
        margin-bottom: 40px;
      }

      .search-header h1 {
        font-family: "Playfair Display", serif;
        font-size: 32px;
        margin-bottom: 10px;
      }

      .search-header p {
        color: var(--gray);
      }

      .products-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 30px;
      }

      .product-card {
        background: var(--light);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      }

      .product-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
      }

      .product-image {
        height: 280px;
        overflow: hidden;
        position: relative;
      }

      .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.8s ease;
      }

      .product-card:hover .product-image img {
        transform: scale(1.08);
      }

      .product-info {
        padding: 20px;
      }

      .product-title {
        font-family: "Playfair Display", serif;
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      .product-desc {
        color: var(--gray);
        font-size: 14px;
        margin-bottom: 15px;
        line-height: 1.6;
      }

      .price-container {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 15px;
      }

      .current-price {
        font-size: 18px;
        font-weight: 700;
        color: var(--primary);
      }

      .original-price {
        font-size: 14px;
        color: var(--gray);
        text-decoration: line-through;
      }

      .add-to-cart {
        background: var(--primary);
        color: var(--light);
        border: none;
        padding: 12px 0;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        width: 100%;
      }

      .add-to-cart:hover {
        background: var(--dark);
        transform: translateY(-2px);
      }

      .no-results {
        text-align: center;
        padding: 60px 0;
      }

      .no-results h2 {
        font-family: "Playfair Display", serif;
        font-size: 28px;
        margin-bottom: 20px;
      }

      .no-results p {
        color: var(--gray);
        margin-bottom: 30px;
      }

      /* Responsive */
      @media (max-width: 900px) {
        .products-container {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 600px) {
        .nav-links {
          display: none;
        }

        .products-container {
          grid-template-columns: 1fr;
        }

        .search-container {
          margin-right: 0;
          margin-left: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      FREE SHIPPING ON ALL ORDERS ABOVE ₹499 | USE CODE: UNLEASH20 FOR 20% OFF
    </div>

    <div class="navbar">
      <div class="logo">UNLEASH.</div>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="blogPage.html">Blog</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </div>

      <div class="nav-icons">
        <form class="search-container" action="search.html" method="GET">
          <input
            type="text"
            name="query"
            placeholder="Search for skincare..."
            value=""
            id="search-input"
          />
          <button type="submit"><i class="fas fa-search"></i></button>
        </form>

        <button class="login-btn">Login</button>

        <div class="cart-icon">
          <a href="cart.html">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count" class="cart-count">0</span>
          </a>
        </div>
      </div>
    </div>

    <div class="search-results">
      <div class="search-header">
        <h1>Search Results</h1>
        <p id="results-count">Showing results for ""</p>
      </div>

      <div class="products-container" id="products-container">
        <!-- Products will be dynamically inserted here -->
      </div>

      <div class="no-results" id="no-results" style="display: none">
        <h2>No products found</h2>
        <p>We couldn't find any products matching your search.</p>
        <a
          href="products.html"
          class="add-to-cart"
          style="
            max-width: 200px;
            margin: 0 auto;
            display: block;
            text-align: center;
          "
        >
          Browse All Products
        </a>
      </div>
    </div>

    <script>
      // Get search query from URL
      const urlParams = new URLSearchParams(window.location.search);
      const searchQuery = urlParams.get("query") || "";

      // Update search input and results count
      document.getElementById("search-input").value = searchQuery;
      document.getElementById(
        "results-count"
      ).textContent = `Showing results for "${searchQuery}"`;

      // Sample product data - in a real app, this would come from your database
      const allProducts = [
        {
          id: 1,
          title: "Gentle Face Serum with Aloe Vera",
          description:
            "Hydrating serum with pure aloe vera extract for all skin types",
          price: 300,
          originalPrice: 450,
          image: "https://i.postimg.cc/bwkrK6HM/IMG-20250308-WA0040.jpg",
          tags: ["serum", "hydrating", "aloe"],
        },
        {
          id: 2,
          title: "Hydrating Lip Mask",
          description:
            "Overnight treatment for dry, chapped lips with hyaluronic acid",
          price: 159,
          originalPrice: 250,
          image: "https://i.postimg.cc/MHwXZ165/IMG-20250308-WA0041.jpg",
          tags: ["lip", "mask", "hydrating"],
        },
        {
          id: 3,
          title: "Ultra Soothing Lip Moisturizer",
          description: "Daily lip treatment with shea butter and vitamin E",
          price: 499,
          originalPrice: 699,
          image: "https://i.postimg.cc/4NBnZKrv/IMG-20250308-WA0039.jpg",
          tags: ["lip", "moisturizer", "soothing"],
        },
        {
          id: 4,
          title: "Collagen Booster Face Toner",
          description:
            "Refreshing toner that enhances skin elasticity and firmness",
          price: 358,
          originalPrice: 499,
          image: "https://i.postimg.cc/3R5x92vh/IMG-20250308-WA0037.jpg",
          tags: ["toner", "collagen", "firming"],
        },
        {
          id: 5,
          title: "Exfoliating Solution",
          description: "Gentle chemical exfoliant with AHA and BHA complex",
          price: 219,
          originalPrice: 350,
          image: "https://i.postimg.cc/nz2f7mK0/IMG-20250308-WA0034.jpg",
          tags: ["exfoliator", "AHA", "BHA"],
        },
        {
          id: 6,
          title: "Hylamide Radiance Booster",
          description: "Illuminating serum for a healthy, glowing complexion",
          price: 299,
          originalPrice: 450,
          image: "https://i.postimg.cc/pr0xNjpp/IMG-20250308-WA0035.jpg",
          tags: ["serum", "radiance", "glow"],
        },
      ];

      // Filter products based on search query
      function filterProducts(query) {
        if (!query) return allProducts;

        const lowerQuery = query.toLowerCase();
        return allProducts.filter(
          (product) =>
            product.title.toLowerCase().includes(lowerQuery) ||
            product.description.toLowerCase().includes(lowerQuery) ||
            product.tags.some((tag) => tag.toLowerCase().includes(lowerQuery))
        );
      }

      // Display filtered products
      function displayResults() {
        const productsContainer = document.getElementById("products-container");
        const noResults = document.getElementById("no-results");
        const filteredProducts = filterProducts(searchQuery);

        if (filteredProducts.length === 0) {
          productsContainer.style.display = "none";
          noResults.style.display = "block";
          return;
        }

        noResults.style.display = "none";
        productsContainer.style.display = "grid";
        productsContainer.innerHTML = "";

        filteredProducts.forEach((product) => {
          const productCard = document.createElement("div");
          productCard.className = "product-card";
          productCard.innerHTML = `
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.title}">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">${product.title}</h3>
                        <p class="product-desc">${product.description}</p>
                        <div class="price-container">
                            <span class="current-price">₹${product.price.toFixed(
                              2
                            )}</span>
                            <span class="original-price">₹${product.originalPrice.toFixed(
                              2
                            )}</span>
                        </div>
                        <button class="add-to-cart" onclick="addToCart(${
                          product.id
                        })">Add to Cart</button>
                    </div>
                `;
          productsContainer.appendChild(productCard);
        });
      }

      // Mock add to cart function
      function addToCart(productId) {
        alert(`Product ${productId} added to cart`);
        // In a real app, you would update the cart count here
      }

      // Initialize the page
      displayResults();
    </script>
  </body>
</html>
